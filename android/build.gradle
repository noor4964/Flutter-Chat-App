buildscript {
    ext.kotlin_version = '2.1.0'
    repositories {
        google()
        mavenCentral()
    }
     dependencies { 
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        classpath 'com.google.gms:google-services:4.3.15'
    }
}
allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.buildDir = "../build"
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(":app")
    // Provide flutter SDK version properties for old-style plugins (e.g.
    // geolocator_android) that reference flutter.compileSdkVersion before
    // the Flutter plugin loader injects them.
    ext.set("flutter", [
        compileSdkVersion: 35,
        minSdkVersion: 23,
        targetSdkVersion: 35,
    ])
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
